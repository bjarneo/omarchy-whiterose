# Whiterose light bar: a firm paper veil over the wallpaper (72% alpha).
# Attention is a black flash; in a monochrome theme the alarm is
# darkness, not hue.
background       = "#eae7e1"
background-alpha = 0.72
text             = "#2a2a2a"
active           = "#000000"
scale-with-font  = true
size-horizontal  = 28
size-vertical    = 30
